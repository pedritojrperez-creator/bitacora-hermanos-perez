<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora Ejecutiva — Hermanos Pérez</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f8f7f5;
  --bg3: #f0ebe5;
  --borde: #e8e3db;
  --texto: #2a2a2a;
  --texto2: #6b6b6b;
  --accent: #5d3a1a;
  --accent-light: #c9a961;
}
body {
  background: var(--bg);
  color: var(--texto);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  padding: 32px 24px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--borde);
  margin-bottom: 48px;
  gap: 20px;
  flex-wrap: wrap;
}
.logo {
  width: 48px;
  height: 48px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
}
.header-title h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.header-stats { display: flex; gap: 32px; }
.stat { text-align: center; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
.stat-label { font-size: 0.7rem; color: var(--texto2); margin-top: 6px; }
.progress-section {
  background: var(--bg);
  border: 1px solid var(--borde);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 48px;
}
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--borde);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.6s ease;
}
.timeline {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.nodo {
  background: var(--bg);
  border: 1px solid var(--borde);
  border-radius: 6px;
  padding: 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
}
.nodo::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--borde);
}
.nodo.completado::before { background: var(--accent); }
.nodo.progreso::before { background: var(--accent-light); }
.nodo:hover {
  border-color: var(--accent-light);
  background: var(--bg2);
}
.nodo-numero {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--accent);
  margin-bottom: 8px;
}
.nodo-titulo {
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 8px;
}
.loading {
  text-align: center;
  padding: 40px;
  color: var(--texto2);
}
.error {
  background: #fee;
  border: 1px solid #fcc;
  color: #c33;
  padding: 16px;
  border-radius: 6px;
  margin: 20px 0;
}
@media (max-width: 768px) {
  body { padding: 16px; }
  .header { flex-direction: column; }
  .header-stats { width: 100%; justify-content: space-around; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <div class="logo">🥩</div>
      <div class="header-title">
        <h1>Bitácora Ejecutiva</h1>
        <p style="color: var(--texto2); margin: 0; font-size: 0.85rem;">Hermanos Pérez — Roadmap Digital</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-value" id="statCompletado">0</div>
        <div class="stat-label">Completado</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statProgreso">0</div>
        <div class="stat-label">En Progreso</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statPendiente">0</div>
        <div class="stat-label">Pendiente</div>
      </div>
    </div>
  </div>

  <div class="progress-section">
    <div style="font-weight: 600; margin-bottom: 16px;">Progreso General</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div style="font-size: 0.85rem; color: var(--texto2); display: flex; justify-content: space-between;">
      <span>Completado: <strong id="tasksCompletadas">0</strong> tareas</span>
      <span>Total: <strong id="tasksTotal">0</strong> tareas</span>
    </div>
  </div>

  <div id="timelineContainer">
    <div class="loading">⏳ Cargando Bitácora...</div>
  </div>

  <div id="faseContainer"></div>
</div>

<script>
(function() {
  const SUPABASE_URL = 'https://kkhtnbfgmpebgqpfxqag.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtraHRuYmZnbXBlYmdxcGZ4cWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5MTMwNDcsImV4cCI6MjA4MzQ4OTA0N30.gKvZA_iodJSMs77s8GHWv169Re4vF61NGtjB_nAsFOI';

  let sbClient;
  let fases = [];
  let tareas = [];

  console.log('🚀 Iniciando...');

  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    console.log('✅ Supabase OK');
    cargarDatos();
  } catch (error) {
    console.error('❌', error.message);
    document.getElementById('timelineContainer').innerHTML = '<div class="error">' + error.message + '</div>';
  }

  function cargarDatos() {
    Promise.all([
      sbClient.from('fases').select('*').order('numero'),
      sbClient.from('tareas').select('*')
    ])
    .then(([fasesRes, tareasRes]) => {
      if (fasesRes.error) throw new Error(fasesRes.error.message);
      if (tareasRes.error) throw new Error(tareasRes.error.message);
      
      fases = fasesRes.data || [];
      tareas = tareasRes.data || [];
      
      console.log('✅', fases.length, 'fases');
      renderTimeline();
      actualizarStats();
    })
    .catch(error => {
      console.error('❌', error);
      document.getElementById('timelineContainer').innerHTML = '<div class="error">' + error.message + '</div>';
    });
  }

  function renderTimeline() {
    let html = '<div class="timeline">';
    fases.forEach(fase => {
      html += '<div class="nodo ' + fase.estado + '" onclick="window.app.abrirFase(' + fase.id + ')"><div class="nodo-numero">' + fase.numero + '</div><div class="nodo-titulo">' + fase.titulo + '</div></div>';
    });
    html += '</div>';
    document.getElementById('timelineContainer').innerHTML = html;
  }

  function abrirFase(faseId) {
    const fase = fases.find(f => f.id === faseId);
    const tareasDelFase = tareas.filter(t => t.fase_id === faseId);
    
    let html = '<div style="background: var(--bg); border: 1px solid var(--borde); border-radius: 8px; padding: 32px;"><div style="font-family: Bebas Neue; font-size: 2.8rem; color: var(--accent); margin-bottom: 16px;">' + fase.numero + '</div><h2 style="font-family: Bebas Neue; font-size: 1.6rem; margin-bottom: 8px;">' + fase.titulo + '</h2><p style="color: var(--texto2);">' + (fase.descripcion || '') + '</p><div style="margin: 24px 0;"><div class="progress-bar"><div class="progress-fill" style="width: ' + fase.progreso + '%"></div></div></div><h3 style="font-weight: 600; margin-bottom: 16px;">Tareas (' + tareasDelFase.length + ')</h3>';
    
    tareasDelFase.forEach(t => {
      html += '<div style="padding: 12px; background: var(--bg2); border: 1px solid var(--borde); border-radius: 6px; margin-bottom: 8px;"><strong>' + t.titulo + '</strong><br><small style="color: var(--texto2);">' + (t.descripcion || '') + '</small></div>';
    });
    
    html += '<button onclick="window.app.cerrar()" style="padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 24px;">← Volver</button></div>';
    
    document.getElementById('timelineContainer').innerHTML = '';
    document.getElementById('faseContainer').innerHTML = html;
  }

  function cerrarFase() {
    document.getElementById('faseContainer').innerHTML = '';
    renderTimeline();
  }

  function actualizarStats() {
    const completadas = fases.filter(f => f.estado === 'completado').length;
    const progreso = fases.filter(f => f.estado === 'progreso').length;
    const pendientes = fases.filter(f => f.estado === 'pendiente').length;
    const tareasCompletadas = tareas.filter(t => t.completada).length;
    const total = tareas.length;
    const pct = total > 0 ? Math.round((tareasCompletadas / total) * 100) : 0;
    
    document.getElementById('statCompletado').textContent = completadas;
    document.getElementById('statProgreso').textContent = progreso;
    document.getElementById('statPendiente').textContent = pendientes;
    document.getElementById('tasksCompletadas').textContent = tareasCompletadas;
    document.getElementById('tasksTotal').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  window.app = { abrirFase, cerrarFase };
})();
</script>

</body>
</html>
